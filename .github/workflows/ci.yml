name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TARPAULIN_VERSION: "0.35.2"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      test-passed: ${{ steps.test.outputs.passed }}
      test-failed: ${{ steps.test.outputs.failed }}
      test-ignored: ${{ steps.test.outputs.ignored }}
      test-parse-error: ${{ steps.test.outputs.parse_error }}
      smoke-passed: ${{ steps.smoke.outputs.passed }}
      smoke-failed: ${{ steps.smoke.outputs.failed }}
      smoke-skipped: ${{ steps.smoke.outputs.skipped }}
      smoke-parse-error: ${{ steps.smoke.outputs.parse_error }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        id: test
        run: |
          OUTPUT=$(cargo test --all-targets 2>&1) || TEST_EXIT=$?
          echo "$OUTPUT"

          # Parse test results with awk (portable, sums across all workspace crates)
          echo "$OUTPUT" | awk -F'[;.]' '/^test result:/ {
            split($2, p, " "); passed += p[1]
            split($3, f, " "); failed += f[1]
            split($4, i, " "); ignored += i[1]
          } END {
            printf "passed=%d\nfailed=%d\nignored=%d\n", passed, failed, ignored
          }' >> "$GITHUB_OUTPUT"

          # Detect parse failure (zero test result lines = format may have changed)
          RESULT_LINES=$(echo "$OUTPUT" | grep -c '^test result:' || true)
          if [ "$RESULT_LINES" -eq 0 ]; then
            echo "parse_error=true" >> "$GITHUB_OUTPUT"
          else
            echo "parse_error=false" >> "$GITHUB_OUTPUT"
          fi

          exit ${TEST_EXIT:-0}

      - name: ShellCheck
        run: shellcheck scripts/smoke-test.sh

      # SECURITY: --offline is intentional — prevents the hamoru binary from making
      # API calls (avoids accidental secret usage or network exfiltration).
      # Do NOT remove --offline without reviewing secret/network implications.
      - name: Smoke test (offline)
        id: smoke
        run: |
          OUTPUT=$(bash scripts/smoke-test.sh --offline --verbose 2>&1) || SMOKE_EXIT=$?
          echo "$OUTPUT"

          # Parse smoke-test summary (single line — grep suffices; cargo test uses
          # awk because it aggregates across multiple workspace crates)
          SUMMARY=$(echo "$OUTPUT" | grep -E '^# [0-9]+ passed,' | tail -1)
          if [ -z "$SUMMARY" ]; then
            echo "parse_error=true" >> "$GITHUB_OUTPUT"
          else
            echo "parse_error=false" >> "$GITHUB_OUTPUT"
            echo "passed=$(echo "$SUMMARY" | grep -oE '^# [0-9]+' | grep -oE '[0-9]+')" >> "$GITHUB_OUTPUT"
            echo "failed=$(echo "$SUMMARY" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+')" >> "$GITHUB_OUTPUT"
            echo "skipped=$(echo "$SUMMARY" | grep -oE '[0-9]+ skipped' | grep -oE '[0-9]+')" >> "$GITHUB_OUTPUT"
          fi

          exit ${SMOKE_EXIT:-0}
        env:
          HAMORU_BIN: target/debug/hamoru-cli

  ollama-smoke:
    name: Ollama Smoke Test
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory: CPU inference on shared runners can be slow/flaky.
    # Promote to required after 2-4 weeks of stable green runs.
    continue-on-error: true
    outputs:
      smoke-passed: ${{ steps.report.outputs.passed }}
      smoke-failed: ${{ steps.report.outputs.failed }}
      smoke-skipped: ${{ steps.report.outputs.skipped }}
      smoke-parse-error: ${{ steps.report.outputs.parse_error }}
      smoke-model: ${{ steps.report.outputs.model }}
      job-outcome: ${{ steps.report.outputs.job_outcome }}
    env:
      OLLAMA_HOST: "127.0.0.1:11434"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: cargo build --bin hamoru-cli

      # Version-pinned + install script integrity check.
      # The install script downloads ~1.7 GB (includes GPU libs we don't need,
      # but there is no CPU-only variant). Azure DC bandwidth handles this in
      # ~30-60 seconds.
      # To update: bump OLLAMA_VERSION, re-download install.sh, update the hash.
      - name: Install Ollama
        env:
          OLLAMA_VERSION: "0.6.2"
        run: |
          curl -fsSL -o /tmp/install-ollama.sh https://ollama.com/install.sh
          echo "25f64b810b947145095956533e1bdf56eacea2673c55a7e586be4515fc882c9f  /tmp/install-ollama.sh" | sha256sum -c -
          sh /tmp/install-ollama.sh
          rm /tmp/install-ollama.sh

      # Restore model cache BEFORE starting server so Ollama discovers
      # models at startup (avoids re-index timing race).
      - name: Cache Ollama model
        id: ollama-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.ollama/models
          key: ollama-models-qwen2.5-0.5b

      # ollama pull requires the server (client-server architecture).
      - name: Start Ollama server
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            if curl -sf --max-time 2 http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Ollama failed to start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Pull model
        if: steps.ollama-cache.outputs.cache-hit != 'true'
        run: ollama pull qwen2.5:0.5b

      # SECURITY: This smoke test runs WITHOUT --offline to enable Ollama
      # (local loopback) testing. This is safe because:
      # 1. Ollama server binds to OLLAMA_HOST=127.0.0.1:11434 (loopback only)
      #    hamoru reads endpoint from smoke-test.sh's hamoru.yaml, not OLLAMA_HOST
      # 2. No API keys (HAMORU_ANTHROPIC_API_KEY, etc.) are set in this job
      # 3. GROUP 2 (external API tests) auto-skips due to missing API keys
      # 4. The existing `check` job retains --offline for zero-network guarantee
      - name: Smoke test (with Ollama)
        id: smoke
        run: |
          bash scripts/smoke-test.sh --verbose 2>&1 | tee /tmp/ollama-smoke.log
        env:
          HAMORU_BIN: target/debug/hamoru-cli

      # Separate step ensures outputs are captured even when smoke test fails.
      # Uses steps.smoke.outcome (not .result) to see the real exit status
      # despite continue-on-error at the job level.
      - name: Parse smoke test results
        id: report
        if: ${{ !cancelled() }}
        env:
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          SUMMARY=$(grep -E '^# [0-9]+ passed,' /tmp/ollama-smoke.log | tail -1)
          if [ -z "$SUMMARY" ]; then
            echo "parse_error=true" >> "$GITHUB_OUTPUT"
          else
            echo "parse_error=false" >> "$GITHUB_OUTPUT"
            echo "passed=$(echo "$SUMMARY" | grep -oE '^# [0-9]+' | grep -oE '[0-9]+')" >> "$GITHUB_OUTPUT"
            echo "failed=$(echo "$SUMMARY" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+')" >> "$GITHUB_OUTPUT"
            echo "skipped=$(echo "$SUMMARY" | grep -oE '[0-9]+ skipped' | grep -oE '[0-9]+')" >> "$GITHUB_OUTPUT"
          fi

          MODEL=$(grep -oE 'run -m local:[a-zA-Z0-9._:/-]+ \(ollama\)' /tmp/ollama-smoke.log | head -1 \
            | sed 's/run -m local://;s/ (ollama)//')
          echo "model=${MODEL:-unknown}" >> "$GITHUB_OUTPUT"

          echo "job_outcome=$SMOKE_OUTCOME" >> "$GITHUB_OUTPUT"

  # SECURITY: This job runs repository code WITH cloud API secrets to test real
  # provider connectivity. Access is guarded by two layers:
  # 1. GitHub built-in: pull_request event blocks secrets from fork PRs
  # 2. Explicit guard: head.repo.full_name == github.repository ensures only
  #    same-repo branches (writers) receive secrets
  # Defense in depth: smoke-test.sh auto-SKIPs when API keys are unset.
  # Matrix values are hardcoded — do NOT parameterize secret_name from
  # external inputs (workflow_dispatch, repository variables, etc.).
  cloud-smoke:
    name: Cloud Smoke (${{ matrix.provider }})
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory: cloud API tests can be flaky due to rate limits or outages.
    # Promote to required after 2-4 weeks of stable green runs.
    continue-on-error: true
    if: >-
      !cancelled()
      && needs.check.result == 'success'
      && (github.event_name == 'push'
      || github.event.pull_request.head.repo.full_name == github.repository)
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: anthropic
            env_name: HAMORU_ANTHROPIC_API_KEY
            secret_name: HAMORU_ANTHROPIC_API_KEY
          # Future providers — add entry + secret:
          # - provider: openai
          #   env_name: HAMORU_OPENAI_API_KEY
          #   secret_name: HAMORU_OPENAI_API_KEY
    # NOTE: With a matrix, outputs capture only one leg's values. This works
    # for the current single-provider matrix. When adding a 2nd provider,
    # rework output aggregation (e.g., artifacts or an intermediate step).
    outputs:
      smoke-passed: ${{ steps.report.outputs.passed }}
      smoke-failed: ${{ steps.report.outputs.failed }}
      smoke-skipped: ${{ steps.report.outputs.skipped }}
      smoke-parse-error: ${{ steps.report.outputs.parse_error }}
      job-outcome: ${{ steps.report.outputs.job_outcome }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: cargo build --bin hamoru-cli

      # SECURITY: Secret is injected via env: directive (not shell expansion).
      # The env_name/secret_name values come from the hardcoded matrix above.
      - name: Smoke test (cloud - ${{ matrix.provider }})
        id: smoke
        env:
          HAMORU_BIN: target/debug/hamoru-cli
          ${{ matrix.env_name }}: ${{ secrets[matrix.secret_name] }}
        run: |
          bash scripts/smoke-test.sh --verbose 2>&1 | tee /tmp/cloud-smoke.log

      # Separate step ensures outputs are captured even when smoke test fails.
      # Uses steps.smoke.outcome (not .result) to see the real exit status
      # despite continue-on-error at the job level.
      - name: Parse smoke test results
        id: report
        if: ${{ !cancelled() }}
        env:
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          SUMMARY=$(grep -E '^# [0-9]+ passed,' /tmp/cloud-smoke.log | tail -1)
          if [ -z "$SUMMARY" ]; then
            echo "parse_error=true" >> "$GITHUB_OUTPUT"
          else
            echo "parse_error=false" >> "$GITHUB_OUTPUT"
            echo "passed=$(echo "$SUMMARY" | grep -oE '^# [0-9]+' | grep -oE '[0-9]+')" >> "$GITHUB_OUTPUT"
            echo "failed=$(echo "$SUMMARY" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+')" >> "$GITHUB_OUTPUT"
            echo "skipped=$(echo "$SUMMARY" | grep -oE '[0-9]+ skipped' | grep -oE '[0-9]+')" >> "$GITHUB_OUTPUT"
          fi

          echo "job_outcome=$SMOKE_OUTCOME" >> "$GITHUB_OUTPUT"

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check licenses, bans, sources
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          command: check licenses bans sources

      - name: Check advisories (non-blocking)
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          command: check advisories
        continue-on-error: true

  # SECURITY: pr-coverage runs untrusted PR code but has NO write permissions.
  # The write token lives only in pr-comment, which never checks out code.
  # Do NOT merge these jobs or add pull-requests: write here.
  # Do NOT change the workflow trigger to pull_request_target — that would
  # run fork code with elevated permissions and access to repository secrets.
  pr-coverage:
    name: PR Coverage
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version "$TARPAULIN_VERSION" --locked

      - name: Run coverage
        run: |
          OUTPUT=$(cargo tarpaulin --workspace --out stdout 2>&1) || TARP_EXIT=$?
          echo "$OUTPUT"
          if [ "${TARP_EXIT:-0}" -ne 0 ]; then
            echo "error" > coverage-pct.txt
            exit 0
          fi
          PCT=$(echo "$OUTPUT" | grep -oP '^\d+\.\d+% coverage' | head -1 | grep -oP '^\d+\.\d+')
          PCT=${PCT:-0.00}
          if ! [[ "$PCT" =~ ^[0-9]+\.[0-9]+$ ]]; then
            PCT=0.00
          fi
          echo "$PCT" > coverage-pct.txt

      - name: Upload coverage result
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-coverage
          path: coverage-pct.txt
          retention-days: 1

  # SECURITY: Do NOT add actions/checkout or run untrusted code in this job.
  # This job has pull-requests: write and must never execute PR code.
  # Do NOT change the trigger to pull_request_target.
  pr-comment:
    name: PR Comment
    needs: [check, ollama-smoke, cloud-smoke, pr-coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download coverage result
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: pr-coverage

      - name: Read coverage percentage
        id: cov
        run: |
          if [ -f coverage-pct.txt ]; then
            COV=$(head -1 coverage-pct.txt 2>/dev/null | tr -d '[:space:]')
          else
            COV="error"
          fi
          if ! [[ "$COV" =~ ^[0-9]+\.[0-9]+$ ]] && [ "$COV" != "error" ]; then
            COV="error"
          fi
          echo "pct=$COV" >> "$GITHUB_OUTPUT"

      - name: Fetch baseline coverage from main
        id: baseline
        run: |
          GIST_URL="https://gist.githubusercontent.com/tyabu12/8c8891a593f77b776e5d672b8dd8ab2c/raw/hamoru-coverage.json"
          RAW=$(curl --fail --silent --max-time 10 "$GIST_URL" 2>/dev/null || echo "")
          BASELINE=""
          if [ -n "$RAW" ]; then
            BASELINE=$(echo "$RAW" | jq -r '.message // empty' | grep -oE '[0-9]+\.[0-9]+' || echo "")
          fi
          if [ -z "$BASELINE" ] || ! [[ "$BASELINE" =~ ^[0-9]+\.[0-9]+$ ]]; then
            BASELINE="N/A"
          fi
          echo "pct=$BASELINE" >> "$GITHUB_OUTPUT"

      - name: Generate comment body
        env:
          CHECK_RESULT: ${{ needs.check.result }}
          TEST_PASSED: ${{ needs.check.outputs.test-passed }}
          TEST_FAILED: ${{ needs.check.outputs.test-failed }}
          TEST_IGNORED: ${{ needs.check.outputs.test-ignored }}
          TEST_PARSE_ERROR: ${{ needs.check.outputs.test-parse-error }}
          SMOKE_PASSED: ${{ needs.check.outputs.smoke-passed }}
          SMOKE_FAILED: ${{ needs.check.outputs.smoke-failed }}
          SMOKE_SKIPPED: ${{ needs.check.outputs.smoke-skipped }}
          SMOKE_PARSE_ERROR: ${{ needs.check.outputs.smoke-parse-error }}
          OLLAMA_PASSED: ${{ needs.ollama-smoke.outputs.smoke-passed }}
          OLLAMA_FAILED: ${{ needs.ollama-smoke.outputs.smoke-failed }}
          OLLAMA_SKIPPED: ${{ needs.ollama-smoke.outputs.smoke-skipped }}
          OLLAMA_PARSE_ERROR: ${{ needs.ollama-smoke.outputs.smoke-parse-error }}
          OLLAMA_MODEL: ${{ needs.ollama-smoke.outputs.smoke-model }}
          OLLAMA_OUTCOME: ${{ needs.ollama-smoke.outputs.job-outcome }}
          CLOUD_PASSED: ${{ needs.cloud-smoke.outputs.smoke-passed }}
          CLOUD_FAILED: ${{ needs.cloud-smoke.outputs.smoke-failed }}
          CLOUD_SKIPPED: ${{ needs.cloud-smoke.outputs.smoke-skipped }}
          CLOUD_PARSE_ERROR: ${{ needs.cloud-smoke.outputs.smoke-parse-error }}
          CLOUD_OUTCOME: ${{ needs.cloud-smoke.outputs.job-outcome }}
          PR_COV: ${{ steps.cov.outputs.pct }}
          BASELINE_PCT: ${{ steps.baseline.outputs.pct }}
          CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## CI Report"
            echo ""

            # Skipped / cancelled state — test step never ran
            if [ "$CHECK_RESULT" = "skipped" ] || [ "$CHECK_RESULT" = "cancelled" ]; then
              echo "> Check job was ${CHECK_RESULT}."
            elif [ "$CHECK_RESULT" = "failure" ]; then
              echo "> **Check job failed.** See [CI logs](${CI_RUN_URL}) for details."
              echo ""
            fi

            # Test results (only when the test step actually ran)
            if [ -n "$TEST_PARSE_ERROR" ]; then
              if [ "$TEST_PARSE_ERROR" = "true" ]; then
                echo "### Test Results"
                echo ""
                echo "> Could not parse test output. Format may have changed."
              else
                # Validate test counts are numeric
                PASSED=$(echo "${TEST_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
                FAILED=$(echo "${TEST_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
                IGNORED=$(echo "${TEST_IGNORED:-0}" | grep -oE '^[0-9]+$' || echo "0")

                echo "### Test Results"
                echo ""
                if [ "$FAILED" = "0" ]; then
                  echo "**${PASSED} passed, ${IGNORED} ignored**"
                else
                  echo "**${PASSED} passed, ${FAILED} FAILED, ${IGNORED} ignored**"
                fi
              fi
            fi

            # Smoke test results
            echo ""
            if [ -z "$SMOKE_PARSE_ERROR" ]; then
              echo "### Smoke Test"
              echo ""
              echo "> Smoke test did not run."
            elif [ "$SMOKE_PARSE_ERROR" = "true" ]; then
              echo "### Smoke Test"
              echo ""
              echo "> Could not parse smoke test output. Format may have changed."
            else
              S_PASSED=$(echo "${SMOKE_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              S_FAILED=$(echo "${SMOKE_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              S_SKIPPED=$(echo "${SMOKE_SKIPPED:-0}" | grep -oE '^[0-9]+$' || echo "0")

              echo "### Smoke Test"
              echo ""
              LINE="${S_PASSED} passed"
              if [ "$S_FAILED" != "0" ]; then
                LINE="${LINE}, ${S_FAILED} FAILED"
              fi
              if [ "$S_SKIPPED" != "0" ]; then
                LINE="${LINE}, ${S_SKIPPED} skipped"
              fi
              echo "**${LINE}**"
            fi

            # Ollama smoke test results
            echo ""
            if [ -z "$OLLAMA_PARSE_ERROR" ]; then
              echo "### Ollama Smoke Test"
              echo ""
              echo "> Ollama smoke test did not produce output."
            elif [ "$OLLAMA_PARSE_ERROR" = "true" ]; then
              echo "### Ollama Smoke Test"
              echo ""
              echo "> Could not parse Ollama smoke test output."
            else
              O_PASSED=$(echo "${OLLAMA_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              O_FAILED=$(echo "${OLLAMA_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              O_SKIPPED=$(echo "${OLLAMA_SKIPPED:-0}" | grep -oE '^[0-9]+$' || echo "0")

              echo "### Ollama Smoke Test"
              echo ""
              LINE="${O_PASSED} passed"
              if [ "$O_FAILED" != "0" ]; then
                LINE="${LINE}, ${O_FAILED} FAILED"
              fi
              if [ "$O_SKIPPED" != "0" ]; then
                LINE="${LINE}, ${O_SKIPPED} skipped"
              fi
              if [ -n "$OLLAMA_MODEL" ] && [ "$OLLAMA_MODEL" != "unknown" ]; then
                LINE="${LINE} (${OLLAMA_MODEL})"
              fi
              echo "**${LINE}**"
            fi

            # Cloud smoke test results (advisory — skipped for fork PRs)
            echo ""
            if [ -z "$CLOUD_PARSE_ERROR" ] && [ "$CLOUD_OUTCOME" = "failure" ]; then
              echo "### Cloud Smoke Test"
              echo ""
              echo "> Cloud smoke test failed (no parseable output)."
            elif [ -z "$CLOUD_PARSE_ERROR" ]; then
              echo "### Cloud Smoke Test"
              echo ""
              echo "> Cloud smoke test did not run."
            elif [ "$CLOUD_PARSE_ERROR" = "true" ]; then
              echo "### Cloud Smoke Test"
              echo ""
              echo "> Could not parse cloud smoke test output."
            else
              C_PASSED=$(echo "${CLOUD_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              C_FAILED=$(echo "${CLOUD_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              C_SKIPPED=$(echo "${CLOUD_SKIPPED:-0}" | grep -oE '^[0-9]+$' || echo "0")

              echo "### Cloud Smoke Test"
              echo ""
              LINE="${C_PASSED} passed"
              if [ "$C_FAILED" != "0" ]; then
                LINE="${LINE}, ${C_FAILED} FAILED"
              fi
              if [ "$C_SKIPPED" != "0" ]; then
                LINE="${LINE}, ${C_SKIPPED} skipped"
              fi
              echo "**${LINE}**"
            fi

            # Coverage with delta
            echo ""
            echo "### Coverage"
            echo ""
            if [ "$PR_COV" = "error" ]; then
              echo "> Coverage measurement failed. See [CI logs](${CI_RUN_URL}) for details."
            elif [ "$BASELINE_PCT" = "N/A" ]; then
              echo "| This PR | \`main\` | Delta |"
              echo "|---------|---------|-------|"
              echo "| **${PR_COV}%** | N/A | — |"
            else
              DELTA=$(awk -v a="$PR_COV" -v b="$BASELINE_PCT" 'BEGIN {printf "%.2f", a - b}')
              # Normalize -0.00 to 0.00 (awk floating point rounding)
              [ "$DELTA" = "-0.00" ] && DELTA="0.00"
              if [ "$(echo "$DELTA" | cut -c1)" = "-" ]; then
                SIGN=""; EMOJI="📉"
              elif [ "$DELTA" = "0.00" ]; then
                SIGN=""; EMOJI="➡️"
              else
                SIGN="+"; EMOJI="📈"
              fi
              echo "| This PR | \`main\` | Delta |"
              echo "|---------|---------|-------|"
              echo "| **${PR_COV}%** | ${BASELINE_PCT}% | ${EMOJI} ${SIGN}${DELTA}% |"
            fi

            echo ""
            echo "---"
            echo "[View full CI run](${CI_RUN_URL})"
          } > /tmp/pr-comment.md

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        # Fork PRs have read-only GITHUB_TOKEN; comment posting will fail gracefully.
        continue-on-error: true
        with:
          header: ci-report
          path: /tmp/pr-comment.md

  coverage:
    name: Coverage
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # SECURITY: This condition prevents fork PRs from accessing GIST_SECRET.
    # Do not remove or weaken without reviewing secret exposure implications.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version "$TARPAULIN_VERSION" --locked

      - name: Run coverage
        id: cov
        run: |
          OUTPUT=$(cargo tarpaulin --workspace --out stdout 2>&1)
          echo "$OUTPUT"
          PCT=$(echo "$OUTPUT" | grep -oP '^\d+\.\d+% coverage' | head -1 | grep -oP '^\d+\.\d+')
          PCT=${PCT:-0.00}
          if ! [[ "$PCT" =~ ^[0-9]+\.[0-9]+$ ]]; then
            PCT=0.00
          fi
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"

      # GIST_SECRET must be a PAT with only the "gist" scope (classic)
      # or "gists: write" (fine-grained). No other permissions needed.
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 8c8891a593f77b776e5d672b8dd8ab2c
          filename: hamoru-coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 0
          maxColorRange: 100

  discord-notify:
    name: Discord Notify
    needs: [check, ollama-smoke, cloud-smoke, security]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # SECURITY: Runs on main pushes and PRs. Fork PRs cannot access
    # DISCORD_WEBHOOK_URL (GitHub blocks secrets on pull_request from forks).
    # The empty-URL guard in the script provides defense in depth.
    if: >-
      !cancelled()
      && (github.event_name == 'pull_request'
      || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    steps:
      # SECURITY: Do NOT add actions/checkout here. This job has access to
      # DISCORD_WEBHOOK_URL and must never execute repository code.
      - name: Send Discord notification
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHECK_RESULT: ${{ needs.check.result }}
          TEST_PASSED: ${{ needs.check.outputs.test-passed }}
          TEST_FAILED: ${{ needs.check.outputs.test-failed }}
          TEST_IGNORED: ${{ needs.check.outputs.test-ignored }}
          TEST_PARSE_ERROR: ${{ needs.check.outputs.test-parse-error }}
          SMOKE_PASSED: ${{ needs.check.outputs.smoke-passed }}
          SMOKE_FAILED: ${{ needs.check.outputs.smoke-failed }}
          SMOKE_SKIPPED: ${{ needs.check.outputs.smoke-skipped }}
          SMOKE_PARSE_ERROR: ${{ needs.check.outputs.smoke-parse-error }}
          OLLAMA_PASSED: ${{ needs.ollama-smoke.outputs.smoke-passed }}
          OLLAMA_FAILED: ${{ needs.ollama-smoke.outputs.smoke-failed }}
          OLLAMA_SKIPPED: ${{ needs.ollama-smoke.outputs.smoke-skipped }}
          OLLAMA_PARSE_ERROR: ${{ needs.ollama-smoke.outputs.smoke-parse-error }}
          OLLAMA_MODEL: ${{ needs.ollama-smoke.outputs.smoke-model }}
          OLLAMA_JOB_OUTCOME: ${{ needs.ollama-smoke.outputs.job-outcome }}
          CLOUD_PASSED: ${{ needs.cloud-smoke.outputs.smoke-passed }}
          CLOUD_FAILED: ${{ needs.cloud-smoke.outputs.smoke-failed }}
          CLOUD_SKIPPED: ${{ needs.cloud-smoke.outputs.smoke-skipped }}
          CLOUD_PARSE_ERROR: ${{ needs.cloud-smoke.outputs.smoke-parse-error }}
          CLOUD_JOB_OUTCOME: ${{ needs.cloud-smoke.outputs.job-outcome }}
          SECURITY_RESULT: ${{ needs.security.result }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          # Skip if webhook URL is not configured
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL not configured; skipping notification"
            exit 0
          fi

          # NOTE: add_line modifies global LINES. Do not call inside subshells or pipes.
          add_line() { LINES="${LINES}${1}"$'\n'; }
          LINES=""
          HAS_FAILURE=false
          HAS_WARNING=false

          # --- Test results ---
          if [ "$CHECK_RESULT" = "skipped" ] || [ "$CHECK_RESULT" = "cancelled" ]; then
            add_line ":warning: **Tests**: ${CHECK_RESULT}"
            HAS_WARNING=true
          elif [ -z "$TEST_PARSE_ERROR" ]; then
            add_line ":warning: **Tests**: did not run"
            HAS_WARNING=true
          elif [ "$TEST_PARSE_ERROR" = "true" ]; then
            add_line ":warning: **Tests**: parse error"
            HAS_WARNING=true
          else
            T_PASSED=$(echo "${TEST_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            T_FAILED=$(echo "${TEST_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            T_IGNORED=$(echo "${TEST_IGNORED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            if [ "$T_FAILED" = "0" ]; then
              add_line ":white_check_mark: **Tests**: ${T_PASSED} passed, ${T_IGNORED} ignored"
            else
              add_line ":x: **Tests**: ${T_PASSED} passed, **${T_FAILED} failed**, ${T_IGNORED} ignored"
              HAS_FAILURE=true
            fi
          fi

          # --- Smoke test ---
          if [ -z "$SMOKE_PARSE_ERROR" ]; then
            add_line ":warning: **Smoke**: did not run"
            HAS_WARNING=true
          elif [ "$SMOKE_PARSE_ERROR" = "true" ]; then
            add_line ":warning: **Smoke**: parse error"
            HAS_WARNING=true
          else
            S_PASSED=$(echo "${SMOKE_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            S_FAILED=$(echo "${SMOKE_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            S_SKIPPED=$(echo "${SMOKE_SKIPPED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            S_LINE="${S_PASSED} passed"
            [ "$S_FAILED" != "0" ] && S_LINE="${S_LINE}, **${S_FAILED} failed**"
            [ "$S_SKIPPED" != "0" ] && S_LINE="${S_LINE}, ${S_SKIPPED} skipped"
            if [ "$S_FAILED" = "0" ]; then
              add_line ":white_check_mark: **Smoke**: ${S_LINE}"
            else
              add_line ":x: **Smoke**: ${S_LINE}"
              HAS_FAILURE=true
            fi
          fi

          # --- Ollama smoke test (advisory — warning, not failure) ---
          if [ -z "$OLLAMA_PARSE_ERROR" ] && [ "$OLLAMA_JOB_OUTCOME" = "failure" ]; then
            add_line ":warning: **Ollama**: job failed (no output)"
            HAS_WARNING=true
          elif [ -z "$OLLAMA_PARSE_ERROR" ]; then
            add_line ":warning: **Ollama**: did not run"
            HAS_WARNING=true
          elif [ "$OLLAMA_PARSE_ERROR" = "true" ]; then
            add_line ":warning: **Ollama**: parse error"
            HAS_WARNING=true
          else
            O_PASSED=$(echo "${OLLAMA_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            O_FAILED=$(echo "${OLLAMA_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            O_SKIPPED=$(echo "${OLLAMA_SKIPPED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            O_LINE="${O_PASSED} passed"
            [ "$O_FAILED" != "0" ] && O_LINE="${O_LINE}, **${O_FAILED} failed**"
            [ "$O_SKIPPED" != "0" ] && O_LINE="${O_LINE}, ${O_SKIPPED} skipped"
            [ -n "$OLLAMA_MODEL" ] && [ "$OLLAMA_MODEL" != "unknown" ] && O_LINE="${O_LINE} (${OLLAMA_MODEL})"
            if [ "$O_FAILED" = "0" ]; then
              add_line ":white_check_mark: **Ollama**: ${O_LINE}"
            else
              add_line ":warning: **Ollama**: ${O_LINE}"
              HAS_WARNING=true
            fi
          fi

          # --- Cloud smoke test (advisory — warning, not failure) ---
          if [ -z "$CLOUD_PARSE_ERROR" ] && [ "$CLOUD_JOB_OUTCOME" = "failure" ]; then
            add_line ":warning: **Cloud**: job failed (no output)"
            HAS_WARNING=true
          elif [ -z "$CLOUD_PARSE_ERROR" ]; then
            add_line ":warning: **Cloud**: did not run"
            HAS_WARNING=true
          elif [ "$CLOUD_PARSE_ERROR" = "true" ]; then
            add_line ":warning: **Cloud**: parse error"
            HAS_WARNING=true
          else
            C_PASSED=$(echo "${CLOUD_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            C_FAILED=$(echo "${CLOUD_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            C_SKIPPED=$(echo "${CLOUD_SKIPPED:-0}" | grep -oE '^[0-9]+$' || echo "0")
            C_LINE="${C_PASSED} passed"
            [ "$C_FAILED" != "0" ] && C_LINE="${C_LINE}, **${C_FAILED} failed**"
            [ "$C_SKIPPED" != "0" ] && C_LINE="${C_LINE}, ${C_SKIPPED} skipped"
            if [ "$C_FAILED" = "0" ]; then
              add_line ":white_check_mark: **Cloud**: ${C_LINE}"
            else
              add_line ":warning: **Cloud**: ${C_LINE}"
              HAS_WARNING=true
            fi
          fi

          # --- Security ---
          # NOTE: Advisory step uses continue-on-error, so security job reports
          # "success" even when advisories fail. Only license/ban/source failures
          # trigger "failure" here.
          if [ "$SECURITY_RESULT" = "success" ]; then
            add_line ":white_check_mark: **Security**: passed"
          elif [ "$SECURITY_RESULT" = "failure" ]; then
            add_line ":x: **Security**: failed"
            HAS_FAILURE=true
          elif [ "$SECURITY_RESULT" = "skipped" ]; then
            add_line ":warning: **Security**: skipped"
            HAS_WARNING=true
          elif [ "$SECURITY_RESULT" = "cancelled" ]; then
            add_line ":warning: **Security**: cancelled"
            HAS_WARNING=true
          else
            add_line ":warning: **Security**: unknown"
            HAS_WARNING=true
          fi

          # --- Determine color ---
          if [ "$HAS_FAILURE" = "true" ]; then
            COLOR=15027531  # 0xe5534b red
          elif [ "$HAS_WARNING" = "true" ]; then
            COLOR=13801762  # 0xd29922 orange
          else
            COLOR=3056707   # 0x2ea043 green
          fi

          # --- Build payload with jq (safe JSON escaping) ---
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          # Event-specific title and link
          if [ "$EVENT_NAME" = "pull_request" ]; then
            EMBED_TITLE="#${PR_NUMBER} ${PR_TITLE}"
            EMBED_URL="${SERVER_URL}/${REPO}/pull/${PR_NUMBER}"
          else
            SHORT_SHA="${COMMIT_SHA:0:7}"
            # Bash parameter expansion — no pipe, avoids SIGPIPE under pipefail + set -e
            FIRST_LINE="${COMMIT_MSG%%$'\n'*}"
            EMBED_TITLE="[${SHORT_SHA}] ${FIRST_LINE}"
            EMBED_URL="${SERVER_URL}/${REPO}/commit/${COMMIT_SHA}"
          fi

          # Truncate description to stay within Discord's 4096-char embed limit
          DESCRIPTION="${LINES}"$'\n'"[View CI run](${RUN_URL})"
          if [ ${#DESCRIPTION} -gt 4000 ]; then
            DESCRIPTION="${DESCRIPTION:0:3997}..."
          fi

          if ! PAYLOAD=$(jq -n \
            --arg title "$EMBED_TITLE" \
            --arg description "$DESCRIPTION" \
            --argjson color "$COLOR" \
            --arg embed_url "$EMBED_URL" \
            '{
              embeds: [{
                title: ($title | if length > 256 then .[0:253] + "..." else . end),
                url: $embed_url,
                description: $description,
                color: $color,
                footer: { text: "GitHub Actions" }
              }],
              allowed_mentions: { parse: [] }
            }'); then
            echo "::warning::jq failed to build payload"
            exit 0
          fi

          if [ -z "$PAYLOAD" ]; then
            echo "::warning::Empty payload; skipping notification"
            exit 0
          fi

          # --- Send to Discord ---
          # SECURITY: stderr suppressed to prevent webhook URL leakage in error messages.
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            -H "Content-Type: application/json" \
            --data-raw "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL" 2>/dev/null) || true

          if [ -z "$HTTP_CODE" ] || ! [[ "$HTTP_CODE" =~ ^[0-9]+$ ]] || [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::warning::Discord webhook returned HTTP ${HTTP_CODE:-timeout}"
          fi
