name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all-targets

  coverage:
    name: Coverage
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # SECURITY: This condition prevents fork PRs from accessing GIST_SECRET.
    # Do not remove or weaken without reviewing secret exposure implications.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version 0.35.2 --locked

      - name: Run coverage
        id: cov
        run: |
          OUTPUT=$(cargo tarpaulin --workspace --out stdout 2>&1)
          echo "$OUTPUT"
          PCT=$(echo "$OUTPUT" | grep -oP '^\d+\.\d+% coverage' | head -1 | grep -oP '^\d+\.\d+')
          PCT=${PCT:-0}
          if ! [[ "$PCT" =~ ^[0-9]+\.[0-9]+$ ]]; then
            PCT=0
          fi
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"

      # GIST_SECRET must be a PAT with only the "gist" scope (classic)
      # or "gists: write" (fine-grained). No other permissions needed.
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 8c8891a593f77b776e5d672b8dd8ab2c
          filename: hamoru-coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 0
          maxColorRange: 100
